{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Poultry Management</title>
    <link rel="stylesheet" href="{% static 'PoutryManagementSysyem/styles.css' %}">
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-panel">
            <img class="login-logo" src="{% static 'PoutryManagementSysyem/images/chick-login-logo.png' %}" alt="Chick logo">
            <div>
                <div class="eyebrow">Secure access</div>
                <h1>Poultry Farm Login</h1>
            </div>
            {% if form.errors %}
                <p class="form-error">Enter a valid username and password.</p>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <label>
                    <span>Username</span>
                    {{ form.username }}
                </label>
                <label>
                    <span>Password</span>
                    {{ form.password }}
                </label>
                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit">Login</button>
            </form>
        </section>
    </main>
</body>
</html>
